<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>OG Image</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#111;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
font-family:'Inter',sans-serif;
}

.canvas{
width:1200px;
height:630px;

background:linear-gradient(135deg,#f8f7f4,#ffffff);

padding:90px;

display:flex;
flex-direction:column;
justify-content:center;

color:#1c1c1e;
}

.brand{
font-size:24px;
font-weight:600;
color:#c9a84c;
margin-bottom:40px;
letter-spacing:0.03em;
}

.title{
font-size:64px;
font-weight:800;
line-height:1.1;
max-width:820px;
}

.subtitle{
font-size:28px;
margin-top:30px;
color:#6b6b6b;
font-weight:500;
}

.footer{
margin-top:auto;
font-size:20px;
color:#999;
}

.accent{
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#c9a84c22,transparent);
top:-200px;
right:-200px;
}

</style>
</head>

<body>

<div class="canvas">

<div class="brand">
Christian Angermeier
</div>

<div class="title">
KI Mentoring für Softwareentwickler
</div>

<div class="subtitle">
Architektur. Struktur. KI-Integration.
</div>

<div class="footer">
angermeier.net
</div>

<div class="accent"></div>

</div>

</body>
</html>
